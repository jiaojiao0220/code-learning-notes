# 文体结构模板库

热点时评:
  structure:
    - "述事：简述事件经过"
    - "矛盾：指出争议焦点"
    - "危害：分析不良影响"
    - "辩证：看待多方立场"
    - "根源：深挖本质原因"
    - "对策：提出解决方案"
    - "升华：总结价值意义"
  keywords:
    - "争议"
    - "乱象"
    - "整治"
    - "事件"
    - "通报"
  word_count:
    min: 800
    max: 2000
  example_titles:
    - "关于{事件}，我想说几句"
    - "{事件}背后的{数字}个真相"
    - "别让{现象}成为{后果}"

现象说理:
  structure:
    - "现象体感：描述亲身感受"
    - "群众共鸣：引起普遍认同"
    - "科学原理：解释客观规律"
    - "人文审美：提升价值高度"
    - "共处哲理：总结生活智慧"
  keywords:
    - "为什么"
    - "现象"
    - "背后"
    - "本质"
    - "观察"
  word_count:
    min: 800
    max: 1800
  example_titles:
    - "为什么{现象}？"
    - "{现象}背后的{数字}个真相"
    - "当{现象}成为{结果}"

人物深度:
  structure:
    - "引子：为什么关注这个人"
    - "生平：关键经历节点"
    - "高光：成就与贡献"
    - "暗面：争议与局限"
    - "启示：对我们有何意义"
  keywords:
    - "人物"
    - "专访"
    - "回忆"
    - "生平"
    - "传记"
  word_count:
    min: 1000
    max: 2500

科普干货:
  structure:
    - "痛点：为什么需要知道这个"
    - "概念：通俗解释核心原理"
    - "案例：实际应用场景"
    - "步骤：可操作的方法"
    - "总结：关键要点回顾"
  keywords:
    - "教程"
    - "指南"
    - "步骤"
    - "干货"
    - "方法"
  word_count:
    min: 800
    max: 2000

治愈散文:
  structure:
    - "场景：一个具体的日常瞬间"
    - "情绪：当下的真实感受"
    - "回忆：联想起过往经历"
    - "顿悟：突然明白的道理"
    - "治愈：如何与自己和解"
  keywords:
    - "治愈"
    - "感悟"
    - "慢生活"
    - "时光"
    - "日常"
  word_count:
    min: 2000
    max: 5000